# 部署：拉 registry 已发布镜像运行；本地构建镜像用 mise run image，不归 compose 管
services:
  standards:
    image: ghcr.io/yuebai-blast/mintpop-standards:${APP_TAG:-latest}
    container_name: mintpop-standards
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"                          # 宿主端口参数化（右侧容器端口固定 80）
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
