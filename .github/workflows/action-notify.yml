name: Action Notify

# 全仓唯一的流水线信使：监听本仓各顶层 workflow 的运行结果，推送到飞书私聊。
# 固定名 action-notify.yml，不参与「动作-组件」命名。
on:
  workflow_run:
    # 列各顶层 workflow 的 name 字段值（不是文件名）；新增顶层 workflow 时补一行。
    workflows:
      - CI
      - Release
    types: [completed]

permissions:
  contents: read
  actions: read       # 失败时读 jobs API 定位「哪个 job 的哪个 step 挂了」

jobs:
  notify:
    name: 推送流水线结果到飞书
    runs-on: ubuntu-latest
    steps:
      - name: 推送流水线结果到飞书私聊
        uses: yuebai-blast/feishu-notify-action@v1
        with:
          app_id: ${{ secrets.FEISHU_APP_ID }}
          app_secret: ${{ secrets.FEISHU_APP_SECRET }}
          receive_id: ${{ secrets.FEISHU_RECEIVE_ID }}
          status: ${{ github.event.workflow_run.conclusion }}
          workflow_name: ${{ github.event.workflow_run.name }}
          repo: ${{ github.repository }}
          run_url: ${{ github.event.workflow_run.html_url }}
          github_token: ${{ github.token }}
