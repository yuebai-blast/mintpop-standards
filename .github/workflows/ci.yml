name: CI

# 单组件仓：直接用动作名 ci.yml / name: CI（无组件名）。
# 质量检查抽在可复用的 quality.yml，本文件只负责「合并前触发」，
# 与 release.yml 的发版前 verify 共用同一份定义、永不漂移。
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 质量门禁
    uses: ./.github/workflows/quality.yml
