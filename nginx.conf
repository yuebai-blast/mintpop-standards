server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # 原始 Markdown：以 text/markdown 内联返回（不是下载），供 Agent 直接读取、页面「复制」按钮 fetch。
    # regex location 优先于下面的前缀 location，故 .md 命中这里、按 markdown 处理。
    location ~ \.md$ {
        types { text/markdown md; }
        charset utf-8;
        add_header Access-Control-Allow-Origin *;
    }

    # 静态资源（图标等）带长缓存
    location /assets/ {
        add_header Access-Control-Allow-Origin *;
        expires 7d;
    }

    # VitePress cleanUrls：无扩展名路由回退到 .html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}
